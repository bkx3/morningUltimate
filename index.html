<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Palo Alto Sunrise Ultimate</title>
    <meta
      name="description"
      content="Palo Alto morning Ultimate meets every Monday, Wednesday, and Friday at 7:00am."
    >
    <meta property="og:title" content="Palo Alto Sunrise Ultimate">
    <meta
      property="og:description"
      content="Palo Alto morning Ultimate meets every Monday, Wednesday, and Friday from 7am to 8am."
    >
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://morningultimate.com/">
    <link rel="canonical" href="https://morningultimate.com/">
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "SportsEvent",
        "name": "Palo Alto Sunrise Ultimate",
        "description": "Palo Alto morning Ultimate pickup game at Mayfield Soccer Complex every Monday, Wednesday, and Friday from 7am to 8am, rain or shine.",
        "sport": "Ultimate Frisbee",
        "url": "https://morningultimate.com/",
        "eventAttendanceMode": "https://schema.org/OfflineEventAttendanceMode",
        "eventStatus": "https://schema.org/EventScheduled",
        "isAccessibleForFree": true,
        "location": {
          "@type": "Place",
          "name": "Mayfield Soccer Complex",
          "address": {
            "@type": "PostalAddress",
            "streetAddress": "El Camino Real and Page Mill Road",
            "addressLocality": "Palo Alto",
            "addressRegion": "CA",
            "addressCountry": "US"
          },
          "geo": {
            "@type": "GeoCoordinates",
            "latitude": 37.423093,
            "longitude": -122.143545
          }
        },
        "eventSchedule": {
          "@type": "Schedule",
          "repeatFrequency": "P1W",
          "byDay": [
            "https://schema.org/Monday",
            "https://schema.org/Wednesday",
            "https://schema.org/Friday"
          ],
          "startTime": "07:00",
          "endTime": "08:00",
          "scheduleTimezone": "America/Los_Angeles"
        },
        "organizer": {
          "@type": "Organization",
          "name": "Palo Alto Sunrise Ultimate",
          "email": "jpickupultimate@frzb.org"
        },
        "sameAs": "https://pickupultimate.com/games/paloaltoultimate"
      }
    </script>
    <style>
      :root {
        color-scheme: dark;
        --ink: #fffaf2;
        --paper: #090912;
        --hot: #f8ff4f;
        --red: #ff4e34;
        --blue: #77e4ff;
        --indigo: #1f2041;
        --grape: #4b3f72;
        --teal: #417b5a;
        --bone: #d0ceba;
        --petal: #e9d2c0;
        --shadow: rgba(0, 0, 0, 0.72);
      }

      * {
        box-sizing: border-box;
      }

      html {
        min-height: 100%;
      }

      body {
        min-height: 100%;
        margin: 0;
        background: var(--paper);
        color: var(--ink);
        font-family:
          ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont,
          "Segoe UI", sans-serif;
      }

      a:focus-visible {
        outline: 4px solid var(--blue);
        outline-offset: 5px;
      }

      .page {
        position: relative;
        display: grid;
        min-height: 100vh;
        place-items: center;
        overflow: hidden;
        padding: 28px;
        isolation: isolate;
      }

      .page::before {
        position: absolute;
        inset: 0;
        z-index: -3;
        background-image: url("assets/hero-background.jpg");
        background-position: center;
        background-size: cover;
        content: "";
        filter: saturate(1.15) contrast(1.15);
      }

      .page::after {
        position: absolute;
        inset: 0;
        z-index: -2;
        background:
          radial-gradient(circle at 78% 48%, rgba(255, 78, 52, 0.18), transparent 26%),
          linear-gradient(90deg, rgba(9, 9, 18, 0.96), rgba(9, 9, 18, 0.74) 46%, rgba(9, 9, 18, 0.52)),
          linear-gradient(180deg, rgba(9, 9, 18, 0.2), rgba(9, 9, 18, 0.82));
        content: "";
      }

      .grain {
        position: absolute;
        inset: 0;
        z-index: -1;
        background-image:
          linear-gradient(rgba(255, 255, 255, 0.06) 1px, transparent 1px),
          linear-gradient(90deg, rgba(255, 255, 255, 0.045) 1px, transparent 1px);
        background-size: 42px 42px;
        mask-image: linear-gradient(180deg, rgba(0, 0, 0, 0.8), transparent 75%);
        pointer-events: none;
      }

      main {
        width: 100%;
        min-width: 0;
        max-width: 1180px;
        text-align: center;
      }

      h1 {
        width: 100%;
        min-width: 0;
        max-width: 1150px;
        margin: 0 auto;
        color: var(--ink);
        font-weight: 950;
        letter-spacing: 0;
        line-height: 0.94;
        text-shadow: 0 10px 40px var(--shadow);
        text-transform: uppercase;
      }

      .headline-line {
        display: block;
        width: 100%;
        min-width: 0;
        overflow: hidden;
        text-align: left;
        white-space: nowrap;
      }

      h2 {
        max-width: 860px;
        margin: 34px auto 0;
        color: rgba(255, 250, 242, 0.9);
        font-size: clamp(1.15rem, 3vw, 2.4rem);
        font-weight: 760;
        letter-spacing: 0;
        line-height: 1.12;
        text-wrap: balance;
      }

      h3 {
        margin: 0;
        font-size: inherit;
        font-weight: inherit;
      }

      .location-link {
        display: inline-grid;
        max-width: min(100%, 720px);
        grid-template-columns: auto minmax(0, max-content);
        align-items: center;
        justify-content: center;
        gap: 10px;
        margin-top: 18px;
        color: rgba(255, 250, 242, 0.8);
        font-size: clamp(0.95rem, 2vw, 1.35rem);
        font-weight: 400;
        line-height: 1.2;
        text-decoration: none;
        text-wrap: balance;
      }

      .location-link svg {
        width: 1.05em;
        height: 1.05em;
        flex: 0 0 auto;
      }

      .actions {
        display: flex;
        flex-wrap: wrap;
        justify-content: center;
        gap: 12px;
        margin-top: 38px;
      }

      .button {
        position: relative;
        display: inline-flex;
        min-height: 54px;
        align-items: center;
        justify-content: center;
        padding: 0 20px;
        border: 2px solid var(--ink);
        border-radius: 0;
        background: var(--ink);
        color: var(--paper);
        font-size: 1rem;
        font-weight: 900;
        text-decoration: none;
        text-transform: uppercase;
        --button-shadow: var(--red);
        box-shadow: 10px 10px 0 var(--button-shadow);
      }

      .button:nth-child(2) {
        background: var(--bone);
        border-color: var(--bone);
        color: var(--indigo);
      }

      .button:nth-child(3) {
        background: var(--petal);
        border-color: var(--petal);
        color: var(--indigo);
      }

      .button::after {
        position: absolute;
        inset: 0;
        z-index: -1;
        background: var(--button-shadow);
        content: "";
        transform: translate(10px, 10px);
      }

      @media (prefers-color-scheme: dark) {
        .button {
          background: var(--indigo);
          border-color: var(--bone);
          color: var(--bone);
          --button-shadow: rgba(208, 206, 186, 0.72);
        }

        .button:nth-child(2) {
          background: var(--grape);
          border-color: var(--bone);
          color: var(--bone);
        }

        .button:nth-child(3) {
          background: var(--teal);
          border-color: var(--bone);
          color: var(--bone);
        }
      }

      @media (prefers-color-scheme: light) {
        :root {
          color-scheme: light;
          --ink: #090912;
          --paper: #fffaf2;
          --shadow: rgba(255, 250, 242, 0.3);
        }

        .page::after {
          background:
            radial-gradient(circle at 78% 48%, rgba(255, 78, 52, 0.24), transparent 26%),
            linear-gradient(90deg, rgba(255, 250, 242, 0.92), rgba(255, 250, 242, 0.72) 46%, rgba(255, 250, 242, 0.42)),
            linear-gradient(180deg, rgba(255, 250, 242, 0.22), rgba(255, 250, 242, 0.86));
        }

        h2 {
          color: rgba(9, 9, 18, 0.84);
        }

        .location-link {
          color: rgba(9, 9, 18, 0.8);
        }

        .button {
          border-color: var(--paper);
        }

        .button:nth-child(3) {
          border-color: var(--ink);
        }
      }

      @media (max-width: 720px) {
        .page {
          align-items: start;
          padding: 30px 16px;
        }

        main {
          padding-top: 8vh;
        }

        h1 {
          line-height: 0.98;
        }

        .location-link {
          max-width: 340px;
          grid-template-columns: auto 1fr;
          text-align: left;
        }

        .location-link svg {
          margin-top: 0.08em;
        }

        .actions {
          display: grid;
          grid-template-columns: 1fr;
        }

        .button {
          width: 100%;
        }
      }

      @media (prefers-reduced-motion: reduce) {
        *,
        *::before,
        *::after {
          transition-duration: 0.01ms !important;
          animation-duration: 0.01ms !important;
          animation-iteration-count: 1 !important;
        }
      }
    </style>
  </head>
  <body>
    <div class="page">
      <div class="grain" aria-hidden="true"></div>
      <main>
        <h1>
          <span class="headline-line">Game On:</span>
          <span class="headline-line" id="nextGame">Monday, June 22</span>
          <span class="headline-line" id="weatherLine" aria-live="polite">rain or shine</span>
        </h1>
        <h2>Palo Alto morning ultimate meets every Monday, Wednesday and Friday from 7am to 8am.</h2>
        <h3>
          <a class="location-link directions-link" href="https://maps.apple.com/?ll=37.423093,-122.143545&q=Morning%20Ultimate%20Palo%20Alto">
            <svg aria-hidden="true" viewBox="0 0 24 24" fill="none">
              <path d="M12 21s7-5.2 7-12A7 7 0 1 0 5 9c0 6.8 7 12 7 12Z" stroke="currentColor" stroke-width="2" />
              <circle cx="12" cy="9" r="2.4" stroke="currentColor" stroke-width="2" />
            </svg>
            <span>Mayfield Soccer Complex @ El Camino Real and Page Mill rd</span>
          </a>
        </h3>
        <nav class="actions" aria-label="Primary">
          <a class="button directions-link" data-directions-label="Get directions" href="https://maps.apple.com/?ll=37.423093,-122.143545&q=Morning%20Ultimate%20Palo%20Alto">Get directions</a>
          <a class="button" href="https://pickupultimate.com/games/paloaltoultimate">PickupUltimate</a>
          <a class="button" href="mailto:jpickupultimate@frzb.org?subject=Morning%20Ultimate%20mailing%20list&body=Hi%20Barrus%2C%0A%0APlease%20add%20me%20to%20the%20Palo%20Alto%20Ultimate%20email%20group.%0A%0AThanks!">Mailing List</a>
        </nav>
      </main>
    </div>

    <script>
      const gameDays = [1, 3, 5];
      const formatter = new Intl.DateTimeFormat("en-US", {
        weekday: "long",
        month: "long",
        day: "numeric",
        timeZone: "UTC",
      });

      function pacificNow(date = new Date()) {
        const parts = new Intl.DateTimeFormat("en-US", {
          timeZone: "America/Los_Angeles",
          weekday: "short",
          year: "numeric",
          month: "numeric",
          day: "numeric",
          hour: "numeric",
          minute: "numeric",
          hourCycle: "h23",
        }).formatToParts(date);
        const get = (type) => parts.find((part) => part.type === type).value;

        return {
          year: Number(get("year")),
          month: Number(get("month")),
          day: Number(get("day")),
          hour: Number(get("hour")),
          minute: Number(get("minute")),
        };
      }

      function dateKeyFromUtcDate(date) {
        const year = date.getUTCFullYear();
        const month = String(date.getUTCMonth() + 1).padStart(2, "0");
        const day = String(date.getUTCDate()).padStart(2, "0");
        return `${year}-${month}-${day}`;
      }

      function calendarDateFromPacific(parts, offsetDays = 0) {
        const date = new Date(Date.UTC(parts.year, parts.month - 1, parts.day + offsetDays, 12));
        return {
          date,
          dayOfWeek: date.getUTCDay(),
          dateKey: dateKeyFromUtcDate(date),
          label: formatter.format(date),
        };
      }

      function currentGameState(now = new Date()) {
        const pacific = pacificNow(now);
        const today = calendarDateFromPacific(pacific);
        const isGameDay = gameDays.includes(today.dayOfWeek);
        const isDuringGame = isGameDay && pacific.hour === 7;
        return { isDuringGame, pacific };
      }

      function nextGameDate(now = new Date()) {
        const { pacific } = currentGameState(now);
        for (let offset = 0; offset <= 7; offset += 1) {
          const candidate = calendarDateFromPacific(pacific, offset);
          if (offset === 0 && pacific.hour >= 8) continue;
          if (gameDays.includes(candidate.dayOfWeek)) {
            return candidate;
          }
        }
        return calendarDateFromPacific(pacific);
      }

      const gameState = currentGameState();
      const nextGame = nextGameDate();
      document.getElementById("nextGame").textContent = gameState.isDuringGame
        ? "WE'RE PLAYING RIGHT NOW"
        : nextGame.label;
      document.getElementById("weatherLine").textContent = gameState.isDuringGame
        ? "AND IT'S GREAT"
        : "rain or shine";

      function fitHeadlineLines() {
        const lines = document.querySelectorAll(".headline-line");
        const minSize = 20;
        const maxSize = Math.min(window.innerWidth * 0.18, 154);

        lines.forEach((line) => {
          line.style.fontSize = `${maxSize}px`;
          line.style.letterSpacing = "0";
          let size = maxSize;

          while (line.scrollWidth > line.clientWidth && size > minSize) {
            size -= 1;
            line.style.fontSize = `${size}px`;
          }

          const remainingWidth = Math.max(line.clientWidth - line.scrollWidth, 0);
          const characterGaps = Math.max(line.textContent.trim().length - 1, 1);
          line.style.letterSpacing = `${remainingWidth / characterGaps}px`;
        });
      }

      window.addEventListener("resize", fitHeadlineLines);
      fitHeadlineLines();

      function gameHourForecast(hourly, hour) {
        const hourText = `${nextGame.dateKey}T${String(hour).padStart(2, "0")}:00`;
        const index = hourly.time.indexOf(hourText);
        if (index < 0) return null;
        return {
          temperature: hourly.temperature_2m?.[index],
          precipitationProbability: hourly.precipitation_probability?.[index],
          weatherCode: hourly.weather_code?.[index],
          windSpeed: hourly.wind_speed_10m?.[index],
        };
      }

      function chooseWeatherLine(hourly) {
        const seven = gameHourForecast(hourly, 7);
        const eight = gameHourForecast(hourly, 8);
        const gameWindow = [seven, eight].filter(Boolean);
        if (!gameWindow.length) return "rain or shine";

        const codes = gameWindow.map((hour) => hour.weatherCode);
        const maxPrecipitationProbability = Math.max(
          ...gameWindow.map((hour) => hour.precipitationProbability ?? 0)
        );
        const maxWindSpeed = Math.max(...gameWindow.map((hour) => hour.windSpeed ?? 0));

        if (codes.some((code) => [61, 63, 65, 66, 67, 80, 81, 82].includes(code))) {
          return "even if it's raining!";
        }

        if (
          codes.some((code) => [51, 53, 55, 56, 57].includes(code)) ||
          maxPrecipitationProbability >= 35
        ) {
          return "even if it's drizzling!";
        }

        if (maxWindSpeed >= 15) {
          return "even if it's windy!";
        }

        if (codes.some((code) => [45, 48].includes(code))) {
          return "even if it's foggy!";
        }

        if (seven?.temperature < 50) {
          return "even if it's cold!";
        }

        return "rain or shine";
      }

      async function updateWeatherLine() {
        if (gameState.isDuringGame) {
          fitHeadlineLines();
          return;
        }

        const weatherLine = document.getElementById("weatherLine");
        const params = new URLSearchParams({
          latitude: "37.423093",
          longitude: "-122.143545",
          hourly: "temperature_2m,precipitation_probability,weather_code,wind_speed_10m",
          temperature_unit: "fahrenheit",
          wind_speed_unit: "mph",
          timezone: "America/Los_Angeles",
          forecast_days: "7",
        });

        try {
          const response = await fetch(`https://api.open-meteo.com/v1/forecast?${params}`);
          if (!response.ok) throw new Error("Forecast unavailable");
          const forecast = await response.json();
          weatherLine.textContent = chooseWeatherLine(forecast.hourly);
          fitHeadlineLines();
        } catch {
          weatherLine.textContent = "rain or shine";
          fitHeadlineLines();
        }
      }

      updateWeatherLine();

      const appleMapsUrl = "https://maps.apple.com/?ll=37.423093,-122.143545&q=Morning%20Ultimate%20Palo%20Alto";
      const googleMapsUrl = "https://www.google.com/maps/search/?api=1&query=37.423093%2C-122.143545";

      function prefersAppleMaps() {
        const platform = navigator.userAgentData?.platform || navigator.platform || "";
        const userAgent = navigator.userAgent || "";
        return /Mac|iPhone|iPad|iPod/i.test(platform) || /iPhone|iPad|iPod|Macintosh/i.test(userAgent);
      }

      const directions = prefersAppleMaps()
        ? { url: appleMapsUrl, label: "Get directions" }
        : { url: googleMapsUrl, label: "Get directions" };

      document.querySelectorAll(".directions-link").forEach((link) => {
        link.href = directions.url;
        const label = link.dataset.directionsLabel;
        if (label) {
          link.setAttribute("aria-label", label);
          link.textContent = label;
        }
      });
    </script>
  </body>
</html>
